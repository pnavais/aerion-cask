name: Bump aerion cask

on:
  schedule:
    - cron: "0 6 * * *" # daily at 06:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write
  repository-projects: write
  statuses: write

jobs:
  bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Gather latest release metadata
        id: release
        run: |
          set -euo pipefail
          API="https://api.github.com/repos/hkdb/aerion/releases/latest"
          echo "Fetching $API"
          resp=$(curl -sL "$API")
          tag=$(echo "$resp" | jq -r '.tag_name')
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

          # Find darwin amd64 and arm64 assets (if present)
          darwin_amd64_url=$(echo "$resp" | jq -r '.assets[] | select(.name|test("darwin.*amd64\\.zip$")) | .browser_download_url' | head -n1)
          darwin_amd64_digest=$(echo "$resp" | jq -r '.assets[] | select(.name|test("darwin.*amd64\\.zip$")) | .digest' | head -n1)
          darwin_arm64_url=$(echo "$resp" | jq -r '.assets[] | select(.name|test("darwin.*arm64\\.zip")) | .browser_download_url' | head -n1)
          darwin_arm64_digest=$(echo "$resp" | jq -r '.assets[] | select(.name|test("darwin.*arm64\\.zip")) | .digest' | head -n1)

          # Strip sha256: prefix if present
          if [ -n "$darwin_amd64_digest" ] && [ "$darwin_amd64_digest" != "null" ]; then darwin_amd64_sha=${darwin_amd64_digest#sha256:}; else darwin_amd64_sha=""; fi
          if [ -n "$darwin_arm64_digest" ] && [ "$darwin_arm64_digest" != "null" ]; then darwin_arm64_sha=${darwin_arm64_digest#sha256:}; else darwin_arm64_sha=""; fi

          echo "darwin_amd64_url=$darwin_amd64_url" >> "$GITHUB_OUTPUT"
          echo "darwin_amd64_sha=$darwin_amd64_sha" >> "$GITHUB_OUTPUT"
          echo "darwin_arm64_url=$darwin_arm64_url" >> "$GITHUB_OUTPUT"
          echo "darwin_arm64_sha=$darwin_arm64_sha" >> "$GITHUB_OUTPUT"

      - name: Update cask file
        id: update
        run: |
          set -euo pipefail
          TAG=${{ steps.release.outputs.tag }}
          DARWIN_AMD64_URL=${{ steps.release.outputs.darwin_amd64_url }}
          DARWIN_AMD64_SHA=${{ steps.release.outputs.darwin_amd64_sha }}
          DARWIN_ARM64_URL=${{ steps.release.outputs.darwin_arm64_url }}
          DARWIN_ARM64_SHA=${{ steps.release.outputs.darwin_arm64_sha }}

          CASK="Casks/aerion.rb"
          if [ ! -f "$CASK" ]; then echo "Cask not found: $CASK"; exit 1; fi

          echo "Current tag: $TAG"

          python3 - "$CASK" "$TAG" "$DARWIN_AMD64_URL" "$DARWIN_AMD64_SHA" "$DARWIN_ARM64_URL" "$DARWIN_ARM64_SHA" <<'PY'
          import sys, re, pathlib
          cask_path = pathlib.Path(sys.argv[1])
          tag = sys.argv[2]
          # Normalize tag for cask version (strip leading 'v' if present)
          tag_for_version = tag[1:] if tag.startswith('v') else tag
          darwin_amd64_url = sys.argv[3]
          darwin_amd64_sha = sys.argv[4]
          darwin_arm64_url = sys.argv[5]
          darwin_arm64_sha = sys.argv[6]

          text = cask_path.read_text()
          # Update version
          text = re.sub(r'version "[^\"]+"', f'version "{tag_for_version}"', text)

          # Replace darwin_amd64 block url and sha if present
          if darwin_amd64_url and darwin_amd64_url != 'null' and darwin_amd64_sha and darwin_amd64_sha != '':
              text = re.sub(r'(if Hardware::CPU.intel\?\("26"\)\n\s*sha256 \")([^"]+)("\n\s*url \")([^"]+)("\n)',
                  lambda m: m.group(1) + darwin_amd64_sha + m.group(3) + darwin_amd64_url + m.group(5),
                  text)

          # Replace darwin_arm64 block url and sha
          if darwin_arm64_url and darwin_arm64_url != 'null' and darwin_arm64_sha and darwin_arm64_sha != '':
              text = re.sub(r'(else\n\s*sha256 \")([^"]+)("\n\s*url \")([^"]+)("\n)',
                  lambda m: m.group(1) + darwin_arm64_sha + m.group(3) + darwin_arm64_url + m.group(5),
                  text)

          cask_path.write_text(text)
          print('Updated cask')
          PY

          git add "$CASK"
          if git diff --staged --quiet; then
            echo "No changes to commit"
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            git -c user.name="github-actions[bot]" -c user.email="41898282+github-actions[bot]@users.noreply.github.com" commit -m "omlx: bump to ${TAG}\n\nCo-authored-by: Copilot <223556219+Copilot@users.noreply.github.com>"
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.update.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "Aerion: bump to ${{ steps.release.outputs.tag }}\n\nCo-authored-by: Copilot <223556219+Copilot@users.noreply.github.com>"
          title: "Aerion: bump to ${{ steps.release.outputs.tag }}"
          body: |
            Automated cask update for Aerion.

            This PR updates the cask to the latest upstream release and updates asset URLs and sha256 sums for both amd64 and arm64 DMG assets.
          base: main
          branch: "bump-aerion-${{ steps.release.outputs.tag }}"
          labels: automated
